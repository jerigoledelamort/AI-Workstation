# LiteLLM Proxy Configuration
# Routes all requests to local Ollama instance
# API key auth enabled for security

model_list:
  # === Low VRAM Profile ===
  - model_name: chat-low
    litellm_params:
      model: ollama/qwen3:8b
      api_base: http://127.0.0.1:11434

  - model_name: coder-low
    litellm_params:
      model: ollama/qwen2.5-coder:7b
      api_base: http://127.0.0.1:11434

  - model_name: vision-low
    litellm_params:
      model: ollama/qwen2.5vl:3b
      api_base: http://127.0.0.1:11434

  - model_name: embed-low
    litellm_params:
      model: ollama/nomic-embed-text
      api_base: http://127.0.0.1:11434

  # === Medium VRAM Profile ===
  - model_name: chat-medium
    litellm_params:
      model: ollama/qwen2.5:14b
      api_base: http://127.0.0.1:11434

  - model_name: coder-medium
    litellm_params:
      model: ollama/deepseek-coder-v2:lite
      api_base: http://127.0.0.1:11434

  - model_name: vision-medium
    litellm_params:
      model: ollama/qwen2.5vl:7b
      api_base: http://127.0.0.1:11434

  - model_name: embed-medium
    litellm_params:
      model: ollama/bge-m3
      api_base: http://127.0.0.1:11434

  # === High VRAM Profile ===
  - model_name: chat-high
    litellm_params:
      model: ollama/qwen2.5:32b
      api_base: http://127.0.0.1:11434

  - model_name: coder-high
    litellm_params:
      model: ollama/qwen3-coder:30b
      api_base: http://127.0.0.1:11434

  - model_name: vision-high
    litellm_params:
      model: ollama/qwen2.5vl:32b
      api_base: http://127.0.0.1:11434

  # === Direct model access (aliases) ===
  - model_name: qwen3:8b
    litellm_params:
      model: ollama/qwen3:8b
      api_base: http://127.0.0.1:11434

  - model_name: qwen2.5-coder:7b
    litellm_params:
      model: ollama/qwen2.5-coder:7b
      api_base: http://127.0.0.1:11434

  - model_name: qwen2.5:14b
    litellm_params:
      model: ollama/qwen2.5:14b
      api_base: http://127.0.0.1:11434

  - model_name: qwen2.5:32b
    litellm_params:
      model: ollama/qwen2.5:32b
      api_base: http://127.0.0.1:11434

  - model_name: qwen3-coder:30b
    litellm_params:
      model: ollama/qwen3-coder:30b
      api_base: http://127.0.0.1:11434

  - model_name: deepseek-coder-v2:lite
    litellm_params:
      model: ollama/deepseek-coder-v2:lite
      api_base: http://127.0.0.1:11434

  - model_name: qwen2.5vl:3b
    litellm_params:
      model: ollama/qwen2.5vl:3b
      api_base: http://127.0.0.1:11434

  - model_name: qwen2.5vl:7b
    litellm_params:
      model: ollama/qwen2.5vl:7b
      api_base: http://127.0.0.1:11434

  - model_name: qwen2.5vl:32b
    litellm_params:
      model: ollama/qwen2.5vl:32b
      api_base: http://127.0.0.1:11434

  - model_name: nomic-embed-text
    litellm_params:
      model: ollama/nomic-embed-text
      api_base: http://127.0.0.1:11434

  - model_name: bge-m3
    litellm_params:
      model: ollama/bge-m3
      api_base: http://127.0.0.1:11434

litellm_settings:
  drop_params: true
  request_timeout: 300

general_settings:
  master_key: os.environ/LITELLM_API_KEY